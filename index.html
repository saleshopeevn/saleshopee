<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mở Nhanh Áp Mã Facebook</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f5f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #1c1e21; font-size: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e4e6eb; font-size: 12px; padding: 4px 8px; border-radius: 12px; color: #65676b; }
        input { width: 100%; padding: 14px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 16px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .btn-primary { background-color: #4267b2; color: white; }
        .btn-secondary { background-color: #e25822; color: #ffffff; }
        .btn-outline { background-color: #f0f2f5; color: #65676b; }
        .note { font-size: 12px; color: #8a8d91; margin-top: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Mở nhanh áp mã Facebook <span class="badge">Chỉ 1 link/lần</span></h2>
    <input type="text" id="shopeeLink" placeholder="Dán link Shopee vào đây...">
    <button class="btn-primary" onclick="pasteLink()">Dán sản phẩm</button>
    <button class="btn-secondary" onclick="openShopee()">Mở nhanh áp mã FB</button>
    <button class="btn-outline" onclick="copyConvertedLink()">Sao chép link</button>
    <div class="note">Hệ thống chỉ nhận 1 link Shopee mỗi lần chuyển đổi.</div>
</div>
<script>
    // Hàm tự động dán từ bộ nhớ tạm
    async function pasteLink() {
        try { const text = await navigator.clipboard.readText(); document.getElementById('shopeeLink').value = text; } 
        catch (err) { alert('Vui lòng nhấn giữ vào ô nhập và dán thủ công.'); }
    }

    let globalFinalLink = "";

    // HÀM XỬ LÝ GHÉP LINK DÙNG AFFILIATE ID (KHÔNG CẦN SERVER/API)
    function handleConvert() {
        let originalLink = document.getElementById('shopeeLink').value.trim();
        if (!originalLink) { alert('Vui lòng nhập link Shopee trước!'); return null; }

        // 🔴 THAY THẾ: Bạn điền Affiliate ID của bạn vào đây (Ví dụ: 800123456)
        // Bạn có thể tìm thấy mã này ở góc trên trang chủ Shopee Affiliate của bạn
        const MY_AFFILIATE_ID = "17383120585"; 

        try {
            // Cú pháp chuẩn của link chuyển đổi Shopee tự động:
            // https://shope.ee/an-dinh?smtt=...
            // Hoặc đơn giản là dùng định dạng link gốc kèm theo mã định danh của bạn:
            let url = new URL(originalLink);
            
            // Xóa bớt các ký tự rác ẩn trong link gốc của khách dán vào
            url.search = ""; 

            // Ghép mã Affiliate ID và mẹo kích hoạt Voucher Facebook cùng một lúc
            url.searchParams.set('utm_source', 'facebook');
            url.searchParams.set('utm_medium', 'cpc');
            url.searchParams.set('utm_campaign', 'fb_exclusive_voucher');
            url.searchParams.set('aff_click_id', MY_AFFILIATE_ID); // Gắn ID hoa hồng của bạn
            
            globalFinalLink = url.href;
            return globalFinalLink;
        } catch (e) {
            alert('Định dạng link không đúng, vui lòng thử lại.');
            return null;
        }
    }

    // Nút mở thẳng App Shopee
    function openShopee() {
        let finalLink = handleConvert();
        if (finalLink) { 
            // Ép điện thoại mở ứng dụng Shopee bằng giao thức shopee://
            window.location.href = finalLink.replace('https://', 'shopee://'); 
        }
    }

    // Nút copy link
    function copyConvertedLink() {
        let finalLink = handleConvert();
        if (finalLink) { 
            navigator.clipboard.writeText(finalLink); 
            alert('Đã sao chép link thành công!'); 
        }
    }
</script>
</body>
</html>
