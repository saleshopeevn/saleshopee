<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Link Shopee</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; 
            background-color: #f5f6f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Khung container chính chứa đổ bóng màu cam thương hiệu */
        .container { 
            background: #ffffff; 
            border-radius: 16px; 
            padding: 32px 24px 24px 24px; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 15px 35px rgba(226, 88, 34, 0.18), 0 5px 15px rgba(0, 0, 0, 0.05); 
            text-align: center; 
            position: relative;
            z-index: 1;
            overflow: hidden; /* Giữ hình nền chìm không tràn ra khỏi bo góc */
        }
        
       /* Đưa hình nền chìm vào riêng bên trong khung container, chỉ hiện 1 hình duy nhất */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('background.jfif');
            background-repeat: no-repeat; /* KHÔNG lặp lại hình ảnh */
            background-position: center; /* Căn hình ảnh nằm chính giữa khung */
            background-size: cover; /* ĐÃ SỬA: Tự động phóng to lấp đầy tràn hết viền khung */
            opacity: 0.08; /* Độ mờ chìm (0.08 = 8%). Tăng lên nếu bạn thấy quá nhạt */
            z-index: -1;
        }
        .copyright-tag {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 10px;
            color: #b0b3b8;
            font-weight: 500;
        }

        h2 { color: #1c1e21; font-size: 18px; margin-bottom: 5px; font-weight: bold; position: relative; }
        .sub-title { color: #65676b; font-size: 13px; margin-bottom: 20px; font-style: italic; position: relative; }
        .input-title { text-align: left; color: #1c1e21; font-size: 14px; font-weight: 500; margin-bottom: 8px; position: relative; }
        input { width: 100%; padding: 14px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 8px; outline: none; position: relative; background: rgba(255, 255, 255, 0.9); }
        
        .status-msg { font-size: 13px; font-weight: 500; margin: 4px 0 12px 0; min-height: 18px; transition: color 0.2s; position: relative; }
        .status-loading { color: #e25822; }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }

        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; position: relative; }
        .btn-primary { background-color: #4267b2; color: white; }
        .btn-secondary { background-color: #e25822; color: #ffffff; }
        .btn-outline { background-color: #f0f2f5; color: #65676b; }
        .note { font-size: 12px; color: #8a8d91; margin-top: 16px; position: relative; }
    </style>
</head>
<body>
<div class="container">
    <div class="copyright-tag">Bản quyền thuộc Duy Huỳnh</div>

    <h2>Nhận Voucher Shopee 22% - 50%</h2>
    <div class="sub-title">Chỉ 1 link/lần</div>
    
    <div class="input-title">Nhập link sản phẩm Shopee</div>
    <input type="text" id="shopeeLink" placeholder="https://shopee.vn/...">
    
    <div id="statusMessage" class="status-msg"></div>

    <button class="btn-primary" onclick="pasteLink()">Dán link sản phẩm</button>
    <button class="btn-secondary" onclick="openShopee()">Nhận voucher</button>
    <button class="btn-outline" onclick="copyConvertedLink()">Sao chép</button>
    
    <div class="note">Hệ thống chỉ nhận 1 link sản phẩm Shopee cho mỗi lần chuyển đổi.</div>
</div>

<script>
    function showStatus(text, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.innerText = text;
        statusEl.className = 'status-msg'; 
        if (type === 'loading') statusEl.classList.add('status-loading');
        if (type === 'success') statusEl.classList.add('status-success');
        if (type === 'error') statusEl.classList.add('status-error');
    }

    async function pasteLink() {
        try { 
            const text = await navigator.clipboard.readText(); 
            document.getElementById('shopeeLink').value = text; 
            showStatus('Đã dán link từ bộ nhớ tạm.', 'success');
        } catch (err) { 
            showStatus('Không thể tự động dán, vui lòng nhấn giữ ô nhập để dán thủ công.', 'error');
        }
    }

    function processLinkAndGetDeeplink(originalUrl) {
        let textContainer = originalUrl.trim();
        if (!textContainer) {
            showStatus('Vui lòng nhập hoặc dán link trước!', 'error');
            return null;
        }

        showStatus('Đang chuyển link...', 'loading');

        let cleanUrl = textContainer;
        const urlExtract = /(https?:\/\/[^\s]+)/i;
        const match = textContainer.match(urlExtract);
        if (match) {
            cleanUrl = match[1];
        }
        
        document.getElementById('shopeeLink').value = cleanUrl; 

        let isAndroid = /Android/i.test(navigator.userAgent);
        let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        let urlText = cleanUrl.replace(/^https?:\/\//i, '');

        let finalDeeplink = cleanUrl;
        if (isAndroid) {
            finalDeeplink = `intent://${urlText}#Intent;scheme=https;package=com.shopee.vn;end;`;
        } else if (isIOS) {
            finalDeeplink = `shopeevn://${urlText}`;
        }

        showStatus('Đã chuyển link thành công!', 'success');
        return finalDeeplink;
    }

    function openShopee() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            setTimeout(() => {
                window.location.href = targetDeeplink; 
            }, 300);
        }
    }

    function copyConvertedLink() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            let linkToCopy = document.getElementById('shopeeLink').value.trim(); 
            navigator.clipboard.writeText(linkToCopy); 
            showStatus('Đã sao chép link thành công!', 'success');
        }
    }
</script>
</body>
</html>
