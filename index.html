<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy Mã Giảm Giá Shopee Toàn Sàn</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f5f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #ffffff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #1c1e21; font-size: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #e4e6eb; font-size: 12px; padding: 4px 8px; border-radius: 12px; color: #65676b; }
        input { width: 100%; padding: 14px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; font-size: 15px; margin-bottom: 16px; outline: none; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 12px; }
        .btn-primary { background-color: #4267b2; color: white; }
        .btn-secondary { background-color: #e25822; color: #ffffff; }
        .btn-outline { background-color: #f0f2f5; color: #65676b; }
        .note { font-size: 12px; color: #8a8d91; margin-top: 16px; }
        
        .status-msg { font-size: 14px; font-weight: 500; margin: 10px 0; min-height: 20px; transition: color 0.2s; }
        .status-loading { color: #e25822; }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
    </style>
</head>
<body>
<div class="container">
    <h2>Mở nhanh áp mã Facebook <span class="badge">Chỉ 1 link/lần</span></h2>
    <input type="text" id="shopeeLink" placeholder="Dán link Shopee vào đây...">
    
    <div id="statusMessage" class="status-msg"></div>

    <button class="btn-primary" onclick="pasteLink()">Dán sản phẩm</button>
    <button class="btn-secondary" onclick="openShopee()">Mở nhanh áp mã FB</button>
    <button class="btn-outline" onclick="copyConvertedLink()">Sao chép link</button>
    <div class="note">Hệ thống chỉ nhận 1 link Shopee mỗi lần chuyển đổi.</div>
</div>

<script>
    function showStatus(text, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.innerText = text;
        statusEl.className = 'status-msg'; 
        if (type === 'loading') statusEl.classList.add('status-loading');
        if (type === 'success') statusEl.classList.add('status-success');
        if (type === 'error') statusEl.classList.add('status-error');
    }

    async function pasteLink() {
        try { 
            const text = await navigator.clipboard.readText(); 
            document.getElementById('shopeeLink').value = text; 
            if (text.trim()) {
                openShopee();
            }
        } catch (err) { 
            showStatus('Không thể tự động dán, vui lòng nhấn giữ ô nhập để dán thủ công.', 'error');
        }
    }

    function processLinkAndGetDeeplink(originalUrl) {
        let textContainer = originalUrl.trim();
        if (!textContainer) {
            showStatus('Vui lòng nhập hoặc dán link trước!', 'error');
            return null;
        }

        showStatus('Đang duyệt mã...', 'loading');

        // ĐÃ XOÁ BỎ HOÀN TOÀN BỘ LỌC KIỂM TRA ĐỂ TRÁNH BÁO LỖI OAN
        let cleanUrl = textContainer;
        const urlExtract = /(https?:\/\/[^\s]+)/i;
        const match = textContainer.match(urlExtract);
        if (match) {
            cleanUrl = match[1];
        }
        
        document.getElementById('shopeeLink').value = cleanUrl; 

        let isAndroid = /Android/i.test(navigator.userAgent);
        let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        let urlText = cleanUrl.replace(/^https?:\/\//i, '');

        let finalDeeplink = cleanUrl;
        if (isAndroid) {
            finalDeeplink = `intent://${urlText}#Intent;scheme=https;package=com.shopee.vn;end;`;
        } else if (isIOS) {
            finalDeeplink = `shopeevn://${urlText}`;
        }

        showStatus('Hệ thống Shopee đã duyệt mã giảm giá thành công!', 'success');
        return finalDeeplink;
    }

    function openShopee() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            setTimeout(() => {
                window.location.href = targetDeeplink; 
            }, 300);
        }
    }

    function copyConvertedLink() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            let linkToCopy = document.getElementById('shopeeLink').value.trim(); 
            navigator.clipboard.writeText(linkToCopy); 
            showStatus('Đã sao chép link thành công!', 'success');
        }
    }
</script>
</body>
</html>
