<script>
    // Hàm hiển thị trạng thái chữ màu động
    function showStatus(text, type) {
        const statusEl = document.getElementById('statusMessage');
        statusEl.innerText = text;
        statusEl.className = 'status-msg'; // Reset class cũ
        if (type === 'loading') statusEl.classList.add('status-loading');
        if (type === 'success') statusEl.classList.add('status-success');
        if (type === 'error') statusEl.classList.add('status-error');
    }

    // Tự động dán từ bộ nhớ tạm và kích hoạt luồng xử lý nhanh
    async function pasteLink() {
        try { 
            const text = await navigator.clipboard.readText(); 
            document.getElementById('shopeeLink').value = text; 
            if (text.trim()) {
                openShopee();
            }
        } catch (err) { 
            showStatus('Không thể tự động dán, vui lòng nhấn giữ ô nhập để dán thủ công.', 'error');
        }
    }

    // Hàm nhận diện, kiểm tra tính hợp lệ và xuất Deeplink mở App
    function processLinkAndGetDeeplink(originalUrl) {
        let cleanUrl = originalUrl.trim();
        if (!cleanUrl) {
            showStatus('Vui lòng nhập hoặc dán link trước!', 'error');
            return null;
        }

        showStatus('Đang chuyển link...', 'loading');

        // BỘ LỌC ĐÃ SỬA: Thêm cờ 'i' để không phân biệt chữ hoa, chữ thường
        const shopeePattern = /shopee\.vn|shope\.ee|s\.shopee\.vn/i;
        
        if (!shopeePattern.test(cleanUrl)) {
            showStatus('Invalid non-shopee URL', 'error');
            return null;
        }

        // Tạo cấu trúc định tuyến mở App theo hệ điều hành
        let isAndroid = /Android/i.test(navigator.userAgent);
        let isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        
        // Làm sạch giao thức đầu link (chấp nhận cả viết hoa viết thường)
        let urlText = cleanUrl.replace(/^https?:\/\//i, '');

        let finalDeeplink = cleanUrl;
        if (isAndroid) {
            finalDeeplink = `intent://${urlText}#Intent;scheme=https;package=com.shopee.vn;end;`;
        } else if (isIOS) {
            finalDeeplink = `shopeevn://${urlText}`;
        }

        // Thông báo thành công sau khi xử lý xong chuỗi ký tự
        showStatus('Đã chuyển link thành công!', 'success');
        return finalDeeplink;
    }

    // Xử lý khi nhấn nút mở app hoặc kích hoạt sau khi dán
    function openShopee() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            setTimeout(() => {
                window.location.href = targetDeeplink; 
            }, 300);
        }
    }

    // Xử lý nút copy link
    function copyConvertedLink() {
        let rawLink = document.getElementById('shopeeLink').value;
        let targetDeeplink = processLinkAndGetDeeplink(rawLink);
        
        if (targetDeeplink) { 
            let linkToCopy = rawLink.trim(); 
            navigator.clipboard.writeText(linkToCopy); 
            showStatus('Đã sao chép link thành công!', 'success');
        }
    }
</script>
